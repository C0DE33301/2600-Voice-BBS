        const audioPlayer = document.getElementById('audio-player');
        const trackList = document.getElementById('track-list');
        const currentTrackTitle = document.getElementById('current-track-title');

        /**
         * Loads a track into the audio player and attempts to play it.
         * @param {string} file - The filename (URL) of the MP3.
         * @param {string} title - The display title of the track.
         */
        function loadTrack(file, title) {
            audioPlayer.src = file;
            currentTrackTitle.textContent = `Now Playing: ${title}`;
            
            // Attempt to play the audio. This might be blocked by browser policies
            // (e.g., no autoplay before user interaction).
            audioPlayer.play().catch(error => {
                console.error("Autoplay failed:", error);
                // If autoplay fails, the user will still see the controls to press play.
                currentTrackTitle.textContent = `Loaded: ${title} (Click Play Above)`;
            });
        }

        /**
         * Renders the list of tracks to the DOM.
         */
        function renderTrackList() {
            // Clear any previous list items (useful if this function was called multiple times)
            trackList.innerHTML = '';
            
            tracks.forEach(track => {
                const listItem = document.createElement('li');
                // Tailwind classes for styling, responsiveness, and hover effect
                listItem.className = 'track-item cursor-pointer bg-gray-50 p-4 rounded-lg flex justify-between items-center transition duration-200 ease-in-out hover:bg-indigo-100 hover:shadow-md';
                
                // Set the list item content
                listItem.innerHTML = `
                    <span class="text-lg font-medium text-gray-700 truncate pr-4">${track.title}</span>
                    <!-- Removed the redundant file name span since title is now the file name -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-indigo-500 flex-shrink-0">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 9.75v4.5m-4.5-4.5v4.5m8.25-2.25l-1.5-.75L12 9l2.25-1.5 1.5.75L18 10.5l-2.25 1.5z" />
                    </svg>
                `;
                
                // Add the click listener to load and play the track
                listItem.addEventListener('click', () => loadTrack(track.file, track.title));
                
                trackList.appendChild(listItem);
            });

            // Set a default state message when the list is rendered
            currentTrackTitle.textContent = `Available Files: ${tracks.length}`;
        }

        // Initialize the list when the page finishes loading
        window.onload = renderTrackList;

    </script>
